<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>知识讲堂 · Jae Daily</title>
<style>
:root {
  --bg:#0d0f13; --bg2:#13161c; --text:#e2e8f0; --text2:#94a3b8;
  --border:#1e293b; --divider:#1a1d24;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:Georgia,serif;
        line-height:1.7; padding:24px 16px; }
.page-wrap { max-width:820px; margin:0 auto; }
.kl-header { border-bottom:2px solid #8a1212; padding-bottom:14px; margin-bottom:24px; }
.kl-header h1 { font-size:22px; font-weight:700; color:#e2e8f0; letter-spacing:0.5px; }
.kl-header-meta { font-size:11px; color:#6b7280; font-family:sans-serif; margin-top:4px; }
.back-link { font-size:11px; color:#94a3b8; text-decoration:none; font-family:sans-serif;
              border:1px solid #2a2d38; padding:3px 10px; border-radius:2px; }
.back-link:hover { color:#e2e8f0; }
.kl-section-title { font-size:13px; font-weight:700; color:#9ca3af; font-family:sans-serif;
                      letter-spacing:1px; text-transform:uppercase; margin:0 0 16px; }
.kl-card { background:var(--bg2); border-radius:6px; margin-bottom:24px;
             padding:20px 22px; border-left:4px solid #8a1212; }
.kl-card-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.kl-badge { font-size:12px; font-weight:800; color:#fff; border-radius:3px;
              padding:2px 8px; font-family:sans-serif; flex-shrink:0; }
.kl-title { font-size:17px; font-weight:700; flex:1; }
.kl-analogy { font-size:12px; color:#b8940e; font-family:sans-serif; font-style:italic;
                background:#1a1612; border-radius:4px; padding:7px 12px;
                margin-bottom:14px; line-height:1.5; }
.kl-body { display:flex; flex-direction:column; gap:11px; }
.kl-row { display:grid; grid-template-columns:5.5em 1fr; gap:6px 12px; }
.kl-label { font-size:10px; font-weight:700; font-family:sans-serif;
              text-transform:uppercase; letter-spacing:0.5px; padding-top:2px;
              white-space:nowrap; }
.kl-content { font-size:13px; line-height:1.7; }
.kl-formula { background:#0d1117; border-left:3px solid #3b82f6; padding:6px 10px;
                font-family:monospace; font-size:12px; color:#93c5fd;
                margin:4px 0; border-radius:0 4px 4px 0; }
.kl-inline-formula { font-family:monospace; color:#a78bfa; font-size:12px; }
.kl-archive { margin-top:40px; border-top:1px solid var(--border); padding-top:24px; }
.kl-archive-row { display:grid; grid-template-columns:5em 1fr auto;
                    gap:8px; padding:9px 0; border-bottom:1px solid var(--divider);
                    align-items:center; }
.kl-arc-date { font-size:10px; color:#6b7280; font-family:sans-serif; white-space:nowrap; }
.kl-arc-title { font-size:13px; color:var(--text); }
.kl-arc-kw { display:flex; gap:4px; flex-wrap:wrap; justify-content:flex-end; }
@media(max-width:600px) {
  .kl-row { grid-template-columns:1fr; gap:2px; }
  .kl-label { padding-top:0; }
  .kl-archive-row { grid-template-columns:4em 1fr; }
  .kl-arc-kw { display:none; }
}
</style>
</head>
<body>
<div class="page-wrap">

  <div class="kl-header" style="display:flex;align-items:flex-start;justify-content:space-between;">
    <div>
      <h1>📚 AI 知识讲堂</h1>
      <div class="kl-header-meta">
        今日 2026年03月25日 · 从 0 个知识点深入讲解 · 每月不重复
      </div>
    </div>
    <a href="latest.html" class="back-link">← 返回日报</a>
  </div>

  <h2 class="kl-section-title" style="margin-bottom:20px;">🎯 今日精讲 · 2026年03月25日</h2>
  <p style="color:#6b7280;font-family:sans-serif;">今日知识讲堂生成失败，明日再试。</p>

  

</div>
</body>
</html>
